<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craps - Mockup 3: Full Screen Bet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
        }
        /* Main Game Screen */
        .game-screen {
            padding: 16px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .header h1 { font-size: 1.2rem; }
        .balance { font-size: 1.3rem; color: #10b981; font-weight: 700; }
        .dice-area {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .dice { font-size: 3rem; }
        .point { color: #f59e0b; margin-top: 8px; font-weight: 600; }
        .bets-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .bet-tile {
            aspect-ratio: 1;
            background: rgba(59, 130, 246, 0.1);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        .bet-tile:active { background: rgba(59, 130, 246, 0.2); }
        .bet-tile.has-bet { background: rgba(16, 185, 129, 0.15); border-color: #10b981; }
        .bet-tile .label { font-size: 0.8rem; font-weight: 600; }
        .bet-tile .amt { 
            position: absolute; 
            bottom: 6px; 
            font-size: 0.65rem; 
            color: #10b981;
        }
        .bet-tile.odds { background: rgba(139, 92, 246, 0.1); border-color: rgba(139, 92, 246, 0.3); }
        .bet-tile.prop { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); }
        .roll-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
        /* Full Screen Bet View */
        .bet-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0f172a;
            flex-direction: column;
            padding: 20px;
        }
        .bet-screen.active { display: flex; }
        .bet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .bet-header h2 { font-size: 1.5rem; }
        .close-btn {
            padding: 10px 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .bet-display {
            text-align: center;
            margin-bottom: 40px;
        }
        .bet-display .label { color: #64748b; margin-bottom: 8px; }
        .bet-display .amount {
            font-size: 4rem;
            font-weight: 700;
            color: #10b981;
        }
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .numkey {
            padding: 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .numkey:active { background: rgba(255,255,255,0.1); }
        .numkey.wide { grid-column: span 2; }
        .place-btn {
            padding: 20px;
            background: #10b981;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Game Screen -->
    <div class="game-screen" id="gameScreen">
        <div class="header">
            <h1>🎲 Craps</h1>
            <div class="balance">$1,000</div>
        </div>
        
        <div class="dice-area">
            <div class="dice">⚅ ⚅</div>
            <div class="point">POINT: 6</div>
        </div>
        
        <div class="bets-grid">
            <div class="bet-tile has-bet" onclick="openBet('Pass Line')">
                <span class="label">Pass</span>
                <span class="amt">$25</span>
            </div>
            <div class="bet-tile odds" onclick="openBet('Pass Odds')">
                <span class="label">+Odds</span>
            </div>
            <div class="bet-tile" onclick="openBet('Come')">
                <span class="label">Come</span>
            </div>
            <div class="bet-tile odds" onclick="openBet('Come Odds')">
                <span class="label">+Odds</span>
            </div>
            <div class="bet-tile" onclick="openBet('Dont Pass')">
                <span class="label">Don't</span>
            </div>
            <div class="bet-tile odds" onclick="openBet('Dont Lay')">
                <span class="label">+Lay</span>
            </div>
            <div class="bet-tile prop" onclick="openBet('Any 7')">
                <span class="label">Any 7</span>
            </div>
            <div class="bet-tile prop" onclick="openBet('Any Craps')">
                <span class="label">Craps</span>
            </div>
            <div class="bet-tile" onclick="openBet('Field')">
                <span class="label">Field</span>
            </div>
        </div>
        
        <button class="roll-btn">🎲 ROLL DICE</button>
    </div>
    
    <!-- Full Screen Bet Entry -->
    <div class="bet-screen" id="betScreen">
        <div class="bet-header">
            <h2 id="betTitle">Pass Line Bet</h2>
            <button class="close-btn" onclick="closeBet()">✕ Cancel</button>
        </div>
        
        <div class="bet-display">
            <div class="label">Bet Amount</div>
            <div class="amount" id="betAmt">$0</div>
        </div>
        
        <div class="numpad">
            <button class="numkey" onclick="addNum(1)">1</button>
            <button class="numkey" onclick="addNum(2)">2</button>
            <button class="numkey" onclick="addNum(3)">3</button>
            <button class="numkey" onclick="addNum(4)">4</button>
            <button class="numkey" onclick="addNum(5)">5</button>
            <button class="numkey" onclick="addNum(6)">6</button>
            <button class="numkey" onclick="addNum(7)">7</button>
            <button class="numkey" onclick="addNum(8)">8</button>
            <button class="numkey" onclick="addNum(9)">9</button>
            <button class="numkey wide" onclick="addNum(0)">0</button>
            <button class="numkey" onclick="backspace()">⌫</button>
        </div>
        
        <button class="place-btn" onclick="placeBet()">Place Bet</button>
    </div>
    
    <script>
        let currentAmt = '';
        
        function openBet(type) {
            document.getElementById('betTitle').textContent = type + ' Bet';
            document.getElementById('betScreen').classList.add('active');
            currentAmt = '';
            updateDisplay();
        }
        function closeBet() {
            document.getElementById('betScreen').classList.remove('active');
        }
        function addNum(n) {
            currentAmt += n;
            updateDisplay();
        }
        function backspace() {
            currentAmt = currentAmt.slice(0, -1);
            updateDisplay();
        }
        function updateDisplay() {
            document.getElementById('betAmt').textContent = '$' + (currentAmt || '0');
        }
        function placeBet() {
            closeBet();
        }
    </script>
</body>
</html>
