<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craps - Mockup 1: Simple Grid</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            padding: 16px;
        }
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        .header h1 { font-size: 1.5rem; margin-bottom: 4px; }
        .balance { font-size: 2rem; color: #10b981; font-weight: 700; }
        .dice-area {
            text-align: center;
            padding: 24px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .dice { font-size: 3rem; margin-bottom: 12px; }
        .point { color: #f59e0b; font-size: 1.2rem; margin-top: 8px; }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .bet-btn {
            padding: 16px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 10px;
            color: #3b82f6;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
        }
        .bet-btn:active { background: rgba(59, 130, 246, 0.3); }
        .bet-btn .amt { 
            position: absolute; 
            top: 4px; 
            right: 8px; 
            font-size: 0.7rem; 
            color: #10b981;
        }
        .bet-btn.odds { background: rgba(139, 92, 246, 0.15); border-color: rgba(139, 92, 246, 0.3); color: #8b5cf6; }
        .bet-btn.prop { background: rgba(245, 158, 11, 0.15); border-color: rgba(245, 158, 11, 0.3); color: #f59e0b; }
        .roll-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e293b;
            padding: 24px;
            border-radius: 16px;
            width: 100%;
            max-width: 320px;
        }
        .modal h3 { margin-bottom: 16px; text-align: center; }
        .modal input {
            width: 100%;
            padding: 16px;
            font-size: 1.5rem;
            text-align: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            margin-bottom: 16px;
        }
        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .modal-btn {
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }
        .modal-btn.confirm { background: #10b981; color: white; }
        .modal-btn.cancel { background: rgba(255,255,255,0.1); color: #94a3b8; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎲 Craps</h1>
        <div class="balance">$1,000</div>
    </div>
    
    <div class="dice-area">
        <div class="dice">⚅ ⚅</div>
        <div>Roll to start</div>
        <div class="point">Point: 6</div>
    </div>
    
    <div class="btn-grid">
        <button class="bet-btn" onclick="openBet('Pass Line')">
            Pass Line
            <span class="amt">$25</span>
        </button>
        <button class="bet-btn odds" onclick="openBet('Pass Odds')">
            + Odds
            <span class="amt">$125</span>
        </button>
        <button class="bet-btn" onclick="openBet('Come')">
            Come
            <span class="amt">$25</span>
        </button>
        <button class="bet-btn odds" onclick="openBet('Come Odds')">
            + Odds
            <span class="amt">$125</span>
        </button>
        <button class="bet-btn" onclick="openBet('Dont Pass')">
            Don't Pass
        </button>
        <button class="bet-btn odds" onclick="openBet('Dont Lay')">
            + Lay
        </button>
        <button class="bet-btn prop" onclick="openBet('Any 7')">
            Any 7
        </button>
        <button class="bet-btn prop" onclick="openBet('Any Craps')">
            Any Craps
        </button>
    </div>
    
    <button class="roll-btn">🎲 ROLL DICE</button>
    
    <!-- Bet Modal -->
    <div class="modal" id="betModal">
        <div class="modal-content">
            <h3 id="modalTitle">Pass Line Bet</h3>
            <input type="number" id="betAmount" placeholder="0" autofocus>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="placeBet()">Place Bet</button>
            </div>
        </div>
    </div>
    
    <script>
        function openBet(type) {
            document.getElementById('modalTitle').textContent = type + ' Bet';
            document.getElementById('betModal').classList.add('active');
            document.getElementById('betAmount').focus();
        }
        function closeModal() {
            document.getElementById('betModal').classList.remove('active');
        }
        function placeBet() {
            closeModal();
        }
    </script>
</body>
</html>
