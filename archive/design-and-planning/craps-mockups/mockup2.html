<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craps - Mockup 2: Bottom Sheet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            padding: 16px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .header h1 { font-size: 1.3rem; }
        .balance { font-size: 1.5rem; color: #10b981; font-weight: 700; }
        .dice-area {
            text-align: center;
            padding: 32px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .dice { font-size: 4rem; margin-bottom: 12px; }
        .status { color: #94a3b8; }
        .point-badge {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 20px;
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border-radius: 20px;
            font-weight: 600;
        }
        .section-title {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            margin: 16px 0 10px 0;
            letter-spacing: 1px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .bet-btn {
            flex: 1;
            padding: 18px 12px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            color: #3b82f6;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .bet-btn:active { background: rgba(59, 130, 246, 0.3); }
        .bet-btn .amt { font-size: 0.75rem; color: #10b981; font-weight: 400; }
        .bet-btn.secondary { background: rgba(139, 92, 246, 0.15); border-color: rgba(139, 92, 246, 0.3); color: #8b5cf6; }
        .bet-btn.prop { background: rgba(245, 158, 11, 0.15); border-color: rgba(245, 158, 11, 0.3); color: #f59e0b; }
        .roll-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }
        /* Bottom Sheet */
        .sheet {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1e293b;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .sheet.active { display: block; }
        .sheet-handle {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 0 auto 20px auto;
        }
        .sheet h3 { margin-bottom: 16px; text-align: center; }
        .quick-amts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .quick-amt {
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .quick-amt:active { background: rgba(255,255,255,0.1); }
        .sheet input {
            width: 100%;
            padding: 18px;
            font-size: 1.75rem;
            text-align: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            margin-bottom: 16px;
        }
        .sheet-btn {
            width: 100%;
            padding: 16px;
            background: #10b981;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎲 Craps</h1>
        <div class="balance">$1,000</div>
    </div>
    
    <div class="dice-area">
        <div class="dice">⚅ ⚅</div>
        <div class="status">Point established</div>
        <div class="point-badge">POINT: 6</div>
    </div>
    
    <div class="section-title">Line Bets</div>
    <div class="btn-row">
        <button class="bet-btn" onclick="openSheet('Pass Line')">
            Pass
            <span class="amt">$25 active</span>
        </button>
        <button class="bet-btn secondary" onclick="openSheet('Pass Odds')">
            + Odds
            <span class="amt">Tap to add</span>
        </button>
    </div>
    
    <div class="btn-row">
        <button class="bet-btn" onclick="openSheet('Come')">
            Come
            <span class="amt">Tap to bet</span>
        </button>
        <button class="bet-btn secondary" onclick="openSheet('Come Odds')">
            + Odds
            <span class="amt">After come bet</span>
        </button>
    </div>
    
    <div class="section-title">Don't Bets</div>
    <div class="btn-row">
        <button class="bet-btn" onclick="openSheet('Dont Pass')">
            Don't Pass
            <span class="amt">Tap to bet</span>
        </button>
        <button class="bet-btn secondary" onclick="openSheet('Dont Lay')">
            + Lay
            <span class="amt">After point</span>
        </button>
    </div>
    
    <div class="section-title">Props</div>
    <div class="btn-row">
        <button class="bet-btn prop" onclick="openSheet('Any 7')">Any 7</button>
        <button class="bet-btn prop" onclick="openSheet('Any Craps')">Any Craps</button>
    </div>
    
    <button class="roll-btn">🎲 ROLL</button>
    
    <!-- Bottom Sheet -->
    <div class="sheet" id="betSheet">
        <div class="sheet-handle"></div>
        <h3 id="sheetTitle">Pass Line Bet</h3>
        <div class="quick-amts">
            <button class="quick-amt" onclick="setAmt(5)">$5</button>
            <button class="quick-amt" onclick="setAmt(25)">$25</button>
            <button class="quick-amt" onclick="setAmt(50)">$50</button>
            <button class="quick-amt" onclick="setAmt(100)">$100</button>
        </div>
        <input type="number" id="sheetInput" placeholder="Enter amount" autofocus>
        <button class="sheet-btn" onclick="placeBet()">Place Bet</button>
    </div>
    
    <script>
        function openSheet(type) {
            document.getElementById('sheetTitle').textContent = type + ' Bet';
            document.getElementById('betSheet').classList.add('active');
            document.getElementById('sheetInput').focus();
        }
        function setAmt(amt) {
            document.getElementById('sheetInput').value = amt;
        }
        function placeBet() {
            document.getElementById('betSheet').classList.remove('active');
        }
    </script>
</body>
</html>
