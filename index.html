<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmer Gill - Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .tagline {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 32px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #3b82f6, #8b5cf6);
            border-radius: 2px;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }
        
        .project-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .project-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .project-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .project-content {
            padding: 24px;
        }
        
        .project-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #f8fafc;
        }
        
        .project-description {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .project-tags {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .tag {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Palmer Gill</h1>
        <p class="tagline">Software Engineer & Builder</p>
    </header>
    
    <main>
        <h2 class="section-title">Projects</h2>
        
        <div class="projects-grid">
            <a href="/stock-research/" class="project-card">
                <div class="project-image">🦞</div>
                <div class="project-content">
                    <h3 class="project-title">Stock Research</h3>
                    <p class="project-description">Real-time stock data with interactive charts, comprehensive financial metrics, and company fundamentals. Built with FastAPI and vanilla JavaScript.</p>
                    <div class="project-tags">
                        <span class="tag">FastAPI</span>
                        <span class="tag">PostgreSQL</span>
                        <span class="tag">Canvas Charts</span>
                    </div>
                </div>
            </a>
            
            <!-- More projects will be added here -->
        </div>
    </main>
    
    <footer>
        <p>© 2026 Palmer Gill. Built with care.</p>
    </footer>
</body>
</html>
