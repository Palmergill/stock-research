<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craps - Palmer Gill</title>
    <link rel="stylesheet" href="/shared/site-nav.css?v=4">
    <style>
        :root {
            --ink: #080a0d;
            --panel: #111722;
            --panel-soft: rgba(255, 255, 255, 0.055);
            --line: rgba(255, 255, 255, 0.14);
            --line-strong: rgba(255, 255, 255, 0.24);
            --text: #f7f3ea;
            --muted: rgba(247, 243, 234, 0.68);
            --quiet: rgba(247, 243, 234, 0.46);
            --gold: #d6b25e;
            --teal: #58d3ad;
            --blue: #72a9ff;
            --coral: #ff7a6e;
            --danger: #ff6f7d;
            --radius: 8px;
            --max: 1080px;
            --shadow: 0 28px 90px rgba(0, 0, 0, 0.36);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            background: var(--ink);
            color-scheme: dark;
        }

        body {
            min-width: 320px;
            min-height: 100vh;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 84px 84px,
                radial-gradient(circle at 78% 8%, rgba(88, 211, 173, 0.18), transparent 28%),
                radial-gradient(circle at 12% 74%, rgba(37, 130, 92, 0.2), transparent 30%),
                linear-gradient(180deg, #080d0b 0%, #091611 48%, #080f0c 100%);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        button,
        input {
            font: inherit;
        }

        button {
            color: inherit;
        }

        .craps-page {
            position: relative;
            width: min(100%, var(--max));
            margin: 0 auto;
            padding: clamp(22px, 4vw, 46px) 24px 24px;
            isolation: isolate;
        }

        .craps-page::before {
            content: "";
            position: fixed;
            inset: clamp(24px, 3vw, 46px);
            z-index: -1;
            border: 1px solid rgba(255, 255, 255, 0.14);
            pointer-events: none;
        }

        .header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            justify-content: space-between;
            align-items: end;
            margin-bottom: 22px;
            padding-top: clamp(18px, 4vw, 42px);
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            color: var(--gold);
            font-size: 0.76rem;
            font-weight: 850;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            content: "";
            width: 44px;
            height: 1px;
            background: currentColor;
        }

        .header h1 {
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(3.4rem, 9vw, 7rem);
            font-weight: 500;
            line-height: 0.9;
            letter-spacing: 0;
        }

        .balance-card {
            min-width: 178px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.026)),
                var(--panel);
            box-shadow: 0 18px 70px rgba(0, 0, 0, 0.16);
        }

        .balance-label {
            display: block;
            margin-bottom: 6px;
            color: var(--quiet);
            font-size: 0.72rem;
            font-weight: 850;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .balance {
            color: var(--gold);
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(1.75rem, 4vw, 2.55rem);
            font-weight: 500;
            line-height: 1;
        }

        .table {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1.08fr) minmax(310px, 0.92fr);
            gap: 18px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.026)),
                rgba(17, 23, 34, 0.84);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .table::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background:
                linear-gradient(135deg, rgba(255, 122, 110, 0.15), transparent 42%),
                radial-gradient(circle at 88% 14%, rgba(214, 178, 94, 0.16), transparent 30%);
            pointer-events: none;
        }

        .status-bar {
            position: relative;
            z-index: 1;
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            min-height: 46px;
            padding: 0 16px;
            border: 1px solid rgba(214, 178, 94, 0.28);
            border-radius: var(--radius);
            background: rgba(214, 178, 94, 0.1);
            color: color-mix(in srgb, var(--gold) 80%, #ffffff);
            font-size: 0.88rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .main-bets {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .bet-btn {
            --accent: var(--gold);
            position: relative;
            width: 100%;
            min-height: 112px;
            overflow: hidden;
            padding: 18px;
            border: 1px solid color-mix(in srgb, var(--accent) 42%, rgba(255, 255, 255, 0.14));
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, color-mix(in srgb, var(--accent) 15%, transparent), rgba(255, 255, 255, 0.026)),
                rgba(8, 10, 13, 0.58);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.17);
            color: inherit;
            cursor: pointer;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
            text-align: center;
        }

        .bet-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, color-mix(in srgb, var(--accent) 30%, transparent), transparent 48%),
                radial-gradient(circle at 86% 16%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 32%);
            opacity: 0.72;
            pointer-events: none;
        }

        .bet-btn:hover,
        .bet-btn:focus-visible {
            transform: translateY(-3px);
            border-color: color-mix(in srgb, var(--accent) 66%, rgba(255, 255, 255, 0.2));
            background:
                linear-gradient(145deg, color-mix(in srgb, var(--accent) 20%, transparent), rgba(255, 255, 255, 0.04)),
                rgba(8, 10, 13, 0.72);
            outline: none;
        }

        .bet-btn:active {
            transform: translateY(0);
        }

        .bet-btn .label,
        .bet-btn .amt {
            position: relative;
            z-index: 1;
            display: block;
        }

        .bet-btn .label {
            color: #ffffff;
            font-size: 0.88rem;
            font-weight: 850;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .bet-btn .amt {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 750;
        }

        .bet-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .pass { --accent: #f7f3ea; }
        .dont,
        .dont-come { --accent: var(--blue); }
        .come { --accent: var(--coral); }
        .place { --accent: var(--gold); }
        .center { --accent: var(--teal); }

        .odds-chip {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 2;
            display: none;
            padding: 4px 8px;
            border: 1px solid rgba(214, 178, 94, 0.48);
            border-radius: 999px;
            background: rgba(214, 178, 94, 0.16);
            color: var(--gold);
            font-size: 0.62rem;
            font-weight: 850;
            letter-spacing: 0.04em;
        }

        .odds-chip.visible { display: block; }

        .quick-actions,
        .active-bets-strip {
            position: relative;
            z-index: 1;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            grid-column: 1;
            gap: 8px;
            align-content: start;
            justify-content: flex-start;
        }

        .quick-btn,
        .close-btn,
        .quick-amt,
        .modal-btn,
        .odds-btn,
        .skip-btn {
            min-height: 42px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
        }

        .quick-btn {
            padding: 0 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.055);
            color: rgba(247, 243, 234, 0.78);
            font-size: 0.76rem;
            font-weight: 850;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .quick-btn:hover,
        .quick-btn:focus-visible {
            transform: translateY(-2px);
            border-color: rgba(214, 178, 94, 0.5);
            background: rgba(214, 178, 94, 0.1);
            color: #ffffff;
            outline: none;
        }

        .quick-btn:disabled {
            opacity: 0.38;
            cursor: not-allowed;
            transform: none;
        }

        .active-bets-strip {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 0;
        }

        .active-bets-strip:empty { display: none; }

        .bet-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            padding: 4px 10px 4px 12px;
            border: 1px solid rgba(214, 178, 94, 0.34);
            border-radius: 999px;
            background: rgba(214, 178, 94, 0.1);
            color: color-mix(in srgb, var(--gold) 72%, #ffffff);
            font-size: 0.74rem;
            font-weight: 760;
        }

        .bet-chip .chip-x,
        .bet-chip .chip-odds {
            min-height: 24px;
            padding: 1px 7px;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 850;
            letter-spacing: 0.04em;
            cursor: pointer;
        }

        .bet-chip .chip-x {
            border: 1px solid rgba(255, 122, 110, 0.34);
            background: rgba(255, 122, 110, 0.09);
            color: var(--coral);
        }

        .bet-chip .chip-odds {
            border: 1px solid rgba(88, 211, 173, 0.38);
            background: rgba(88, 211, 173, 0.1);
            color: var(--teal);
        }

        .bet-chip .chip-x:disabled {
            cursor: not-allowed;
            opacity: 0.36;
        }

        .dice-area {
            position: relative;
            z-index: 1;
            grid-column: 2;
            grid-row: 2 / span 2;
            display: flex;
            min-height: 100%;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            padding: clamp(22px, 4vw, 36px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.095), rgba(255, 255, 255, 0.024)),
                rgba(8, 10, 13, 0.56);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-align: center;
        }

        .dice-area::before {
            content: "";
            position: absolute;
            inset: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius);
            pointer-events: none;
        }

        .dice-container {
            display: flex;
            gap: clamp(14px, 3vw, 26px);
            justify-content: center;
            margin-bottom: 18px;
        }

        .die {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: clamp(74px, 11vw, 108px);
            height: clamp(74px, 11vw, 108px);
            padding: clamp(8px, 1.3vw, 13px);
            border: 1px solid rgba(255, 255, 255, 0.72);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, #fffaf0 0%, #d8dce2 100%);
            box-shadow:
                0 24px 48px rgba(0, 0, 0, 0.32),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .die-dot {
            align-self: center;
            justify-self: center;
            width: clamp(11px, 1.55vw, 16px);
            height: clamp(11px, 1.55vw, 16px);
            border-radius: 50%;
            background: #111722;
            box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.35);
        }

        .die-dot.hidden { opacity: 0; }

        .point-display {
            min-height: 24px;
            margin-bottom: 16px;
            color: var(--gold);
            font-size: 0.84rem;
            font-weight: 850;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .roll-result-burst {
            position: absolute;
            top: 14px;
            left: 50%;
            z-index: 5;
            min-width: 104px;
            padding: 8px 14px;
            border: 1px solid currentColor;
            border-radius: 999px;
            background: rgba(8, 10, 13, 0.92);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.38);
            font-size: 1.15rem;
            font-weight: 850;
            letter-spacing: 0;
            opacity: 0;
            pointer-events: none;
            text-align: center;
            transform: translate(-50%, 8px) scale(0.85);
        }
        .roll-result-burst.win {
            color: var(--teal);
            text-shadow: 0 0 12px rgba(88, 211, 173, 0.55);
        }
        .roll-result-burst.loss {
            color: var(--coral);
            text-shadow: 0 0 12px rgba(255, 122, 110, 0.55);
        }
        .roll-result-burst.active {
            animation: rollResultBurst 1.2s ease-out forwards;
        }
        @keyframes rollResultBurst {
            0% { opacity: 0; transform: translate(-50%, 12px) scale(0.82); }
            18% { opacity: 1; transform: translate(-50%, 0) scale(1.12); }
            42% { opacity: 1; transform: translate(-50%, -4px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -34px) scale(0.96); }
        }
        .roll-btn {
            width: 100%;
            min-height: 56px;
            border: 1px solid #f7f3ea;
            border-radius: var(--radius);
            background: #f7f3ea;
            color: #0a0d12;
            font-size: 0.95rem;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 180ms ease, background 180ms ease, border-color 180ms ease, opacity 180ms ease;
        }

        .roll-btn:hover,
        .roll-btn:focus-visible {
            transform: translateY(-2px);
            border-color: var(--gold);
            background: var(--gold);
            outline: none;
        }

        .roll-btn:active {
            transform: translateY(0);
        }

        .roll-btn:disabled {
            opacity: 0.48;
            cursor: not-allowed;
            transform: none;
        }

        .submenu {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            flex-direction: column;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 84px 84px,
                radial-gradient(circle at 78% 8%, rgba(88, 211, 173, 0.14), transparent 28%),
                linear-gradient(180deg, #080d0b 0%, #091611 48%, #080f0c 100%);
        }

        .submenu.active { display: flex; }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: clamp(18px, 4vw, 34px) clamp(18px, 5vw, 48px);
            border-bottom: 1px solid var(--line);
            background: rgba(8, 10, 13, 0.82);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .menu-header h2 {
            color: var(--text);
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 500;
            line-height: 0.96;
            letter-spacing: 0;
        }

        .close-btn {
            padding: 0 16px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            font-size: 0.84rem;
            font-weight: 850;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .close-btn:hover,
        .close-btn:focus-visible {
            transform: translateY(-2px);
            border-color: rgba(214, 178, 94, 0.5);
            background: rgba(214, 178, 94, 0.1);
            outline: none;
        }

        .numbers-grid,
        .center-grid {
            width: min(100%, var(--max));
            margin: 0 auto;
            overflow-y: auto;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: clamp(18px, 4vw, 40px) 24px 36px;
        }

        .number-btn {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: 1px solid rgba(214, 178, 94, 0.34);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(214, 178, 94, 0.14), rgba(255, 255, 255, 0.024)),
                var(--panel);
            color: var(--gold);
            box-shadow: 0 18px 70px rgba(0, 0, 0, 0.16);
            cursor: pointer;
            font: inherit;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        }

        .number-btn:hover,
        .number-btn:focus-visible,
        .center-btn-tile:hover,
        .center-btn-tile:focus-visible {
            transform: translateY(-4px);
            outline: none;
        }

        .number-btn .num {
            color: #ffffff;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 500;
            line-height: 0.95;
        }

        .number-btn .payout,
        .number-btn .bet-info {
            margin-top: 8px;
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .number-btn .bet-info {
            color: var(--gold);
        }

        .number-btn.has-bet {
            border-color: rgba(247, 243, 234, 0.68);
            background:
                linear-gradient(145deg, rgba(214, 178, 94, 0.24), rgba(255, 255, 255, 0.045)),
                var(--panel);
        }

        .center-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: clamp(18px, 4vw, 40px) 24px 36px;
        }

        .center-btn-tile {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border: 1px solid rgba(255, 122, 110, 0.34);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 122, 110, 0.14), rgba(255, 255, 255, 0.024)),
                var(--panel);
            box-shadow: 0 18px 70px rgba(0, 0, 0, 0.16);
            cursor: pointer;
            font: inherit;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        }

        .center-btn-tile .label {
            max-width: 9ch;
            color: #ffffff;
            font-size: clamp(0.9rem, 2.8vw, 1.35rem);
            font-weight: 850;
            line-height: 1.05;
            text-align: center;
            text-transform: uppercase;
        }

        .center-btn-tile .payout,
        .center-btn-tile .bet-info {
            margin-top: 8px;
            color: var(--muted);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-align: center;
            text-transform: uppercase;
        }

        .center-btn-tile .bet-info {
            color: var(--gold);
        }

        .center-btn-tile.has-bet {
            border-color: rgba(214, 178, 94, 0.72);
            background:
                linear-gradient(145deg, rgba(255, 122, 110, 0.2), rgba(214, 178, 94, 0.08)),
                var(--panel);
        }

        .bet-modal {
            display: none;
            position: fixed;
            inset: 0;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 200;
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .bet-modal.active { display: flex; }

        .bet-modal-content {
            width: 100%;
            max-width: 380px;
            padding: 24px;
            border: 1px solid rgba(214, 178, 94, 0.34);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.026)),
                #111722;
            box-shadow: var(--shadow);
        }

        .bet-modal h3 {
            margin-bottom: 10px;
            color: var(--text);
            font-family: Georgia, "Times New Roman", serif;
            font-size: 2rem;
            font-weight: 500;
            line-height: 1;
            text-align: center;
        }

        .bet-modal .current-bet-info {
            min-height: 20px;
            margin-bottom: 14px;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 700;
            text-align: center;
        }

        .bet-modal input {
            width: 100%;
            margin-bottom: 14px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: var(--radius);
            background: rgba(8, 10, 13, 0.64);
            color: var(--text);
            appearance: textfield;
            -moz-appearance: textfield;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 2.1rem;
            font-weight: 500;
            text-align: center;
        }

        .bet-modal input::-webkit-outer-spin-button,
        .bet-modal input::-webkit-inner-spin-button {
            margin: 0;
            -webkit-appearance: none;
        }

        .bet-modal input:focus {
            border-color: rgba(214, 178, 94, 0.62);
            outline: none;
        }

        .bet-modal input::placeholder { color: rgba(247, 243, 234, 0.32); }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }

        .quick-amt {
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.055);
            color: rgba(247, 243, 234, 0.82);
            font-size: 0.9rem;
            font-weight: 800;
            text-align: center;
        }

        .quick-amt:hover,
        .quick-amt:focus-visible {
            border-color: rgba(214, 178, 94, 0.5);
            background: rgba(214, 178, 94, 0.1);
            outline: none;
        }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .modal-actions.three-col { grid-template-columns: 1fr 1fr 1fr; }

        .modal-btn {
            padding: 0 12px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            font-size: 0.82rem;
            font-weight: 850;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .modal-btn:hover,
        .modal-btn:focus-visible,
        .odds-btn:hover,
        .odds-btn:focus-visible,
        .skip-btn:hover,
        .skip-btn:focus-visible {
            transform: translateY(-2px);
            outline: none;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.055);
            color: rgba(247, 243, 234, 0.8);
        }

        .modal-btn.confirm {
            border-color: #f7f3ea;
            background: #f7f3ea;
            color: #0a0d12;
        }

        .modal-btn.remove {
            border-color: rgba(255, 122, 110, 0.48);
            background: rgba(255, 122, 110, 0.11);
            color: var(--coral);
        }

        .point-popup {
            display: none;
            position: fixed;
            inset: 0;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 300;
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .point-popup.active { display: flex; }

        .point-popup-content {
            width: 100%;
            max-width: 380px;
            padding: 28px;
            border: 1px solid rgba(214, 178, 94, 0.34);
            border-radius: var(--radius);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.026)),
                #111722;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .point-popup h2 {
            color: var(--gold);
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .point-popup .point-number {
            margin: 16px 0;
            color: #ffffff;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 5rem;
            font-weight: 500;
            line-height: 0.9;
        }

        .point-popup .point-text {
            margin-bottom: 20px;
            color: var(--muted);
            font-size: 1rem;
        }

        .odds-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .odds-btn {
            border: 1px solid rgba(214, 178, 94, 0.34);
            background: rgba(214, 178, 94, 0.1);
            color: var(--gold);
            font-size: 0.9rem;
            font-weight: 850;
        }

        .odds-btn.max-btn {
            grid-column: span 3;
            border-color: #f7f3ea;
            background: #f7f3ea;
            color: #0a0d12;
        }

        .point-popup .skip-btn {
            padding: 0 24px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.16);
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 850;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .point-popup .timer-bar {
            height: 4px;
            margin-top: 16px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--gold), var(--coral));
            animation: timerCountdown 10s linear forwards;
        }

        @keyframes timerCountdown {
            from { width: 100%; }
            to { width: 0%; }
        }

        footer {
            text-align: center;
            padding: 22px 24px 34px;
            color: var(--quiet);
            font-size: 0.78rem;
        }

        @media (max-width: 980px) {
            .table {
                grid-template-columns: 1fr;
            }

            .dice-area {
                grid-column: 1;
                grid-row: auto;
            }

            .quick-actions {
                grid-column: 1;
            }
        }

        @media (max-width: 899px) {
            .craps-page {
                padding: 18px 18px 20px;
            }

            .craps-page::before {
                inset: calc(var(--site-nav-mobile-height, 56px) + 14px) 14px 14px;
            }

            .submenu,
            .bet-modal,
            .point-popup {
                top: var(--site-nav-mobile-height, 56px);
            }
        }

        @media (max-width: 620px) {
            .header {
                grid-template-columns: 1fr;
                align-items: start;
                gap: 14px;
                margin-bottom: 16px;
                padding-top: 8px;
            }

            .header h1 {
                font-size: clamp(3rem, 15vw, 4.2rem);
            }

            .balance-card {
                width: 100%;
                padding: 14px 16px;
            }

            .balance {
                font-size: 1.95rem;
            }

            .table {
                padding: 12px;
                gap: 10px;
            }

            .status-bar {
                min-height: 42px;
                font-size: 0.76rem;
                letter-spacing: 0.05em;
            }

            .main-bets {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 8px;
            }

            .bet-btn {
                min-height: 84px;
                padding: 12px 8px;
            }

            .bet-btn .label {
                font-size: 0.64rem;
                line-height: 1.15;
            }

            .bet-btn .amt {
                margin-top: 8px;
                font-size: 0.7rem;
                line-height: 1.2;
            }

            .quick-actions {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
            }

            .quick-btn {
                padding: 0 8px;
                font-size: 0.68rem;
            }

            .dice-area {
                padding: 20px 16px;
            }

            .numbers-grid,
            .center-grid {
                grid-template-columns: repeat(2, 1fr);
                padding-inline: 18px;
            }

            .modal-actions.three-col {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>
<body>
    <div class="craps-page">
        <header class="header">
            <div>
                <p class="eyebrow">Dice table</p>
                <h1>Craps</h1>
            </div>
            <div class="balance-card" aria-label="Current bankroll">
                <span class="balance-label">Bankroll</span>
                <div class="balance" id="balance">$1,000</div>
            </div>
        </header>

    <main class="table">
        <div class="status-bar" id="gameStatus">Place bets & roll</div>

        <div class="main-bets">
            <button type="button" class="bet-btn pass" id="passLineBtn" onclick="openBetModal('passLine')">
                <span class="label">PASS LINE</span>
                <span class="amt" id="passLineInfo">Tap to bet</span>
                <span class="odds-chip" id="passLineOddsChip"></span>
            </button>
            <button type="button" class="bet-btn dont" id="dontPassBtn" onclick="openBetModal('dontPass')">
                <span class="label">DON'T PASS</span>
                <span class="amt" id="dontPassInfo">Tap to bet</span>
                <span class="odds-chip" id="dontPassOddsChip"></span>
            </button>
            <button type="button" class="bet-btn come disabled" id="comeBtn" onclick="openBetModal('come')" disabled>
                <span class="label">COME</span>
                <span class="amt" id="comeInfo">Tap to bet</span>
                <span class="odds-chip" id="comeOddsChip"></span>
            </button>
            <button type="button" class="bet-btn dont-come disabled" id="dontComeBtn" onclick="openBetModal('dontCome')" disabled>
                <span class="label">DON'T COME</span>
                <span class="amt" id="dontComeInfo">Tap to bet</span>
                <span class="odds-chip" id="dontComeOddsChip"></span>
            </button>
            <button type="button" class="bet-btn place" onclick="openPlaceMenu()">
                <span class="label">PLACE</span>
                <span class="amt" id="placeInfo">4, 5, 6, 8, 9, 10</span>
            </button>
            <button type="button" class="bet-btn center" onclick="openCenterMenu()">
                <span class="label">CENTER</span>
                <span class="amt" id="centerInfo">Props & Hardways</span>
            </button>
        </div>

        <div class="quick-actions">
            <button class="quick-btn" id="repeatBtn" onclick="repeatLastBets()" disabled>Repeat</button>
            <button class="quick-btn" id="maxOddsBtn" onclick="takeMaxOddsAll()" disabled>Max Odds</button>
            <button class="quick-btn" id="clearAllBtn" onclick="clearAllBets()">Clear All</button>
        </div>

        <div class="active-bets-strip" id="activeBetsStrip"></div>

        <div class="dice-area">
            <div class="dice-container">
                <div class="die" id="die1"><div class="die-dot" style="grid-area: 2/2;"></div></div>
                <div class="die" id="die2"><div class="die-dot" style="grid-area: 2/2;"></div></div>
            </div>
            <div class="point-display" id="pointDisplay"></div>
            <div class="roll-result-burst" id="rollResultBurst" aria-live="polite" aria-atomic="true"></div>
            <button class="roll-btn" id="rollButton" onclick="rollDice()">ROLL DICE</button>
        </div>
    </main>
    </div>

    <!-- Place Bets Submenu -->
    <div class="submenu" id="placeMenu">
        <div class="menu-header">
            <h2>Place Bets</h2>
            <button class="close-btn" onclick="closePlaceMenu()">Done</button>
        </div>
        <div class="numbers-grid">
            <button type="button" class="number-btn" id="place4Btn" onclick="openBetModal('place4')"><span class="num">4</span><span class="payout">9:5</span><span class="bet-info" id="place4Info"></span></button>
            <button type="button" class="number-btn" id="place5Btn" onclick="openBetModal('place5')"><span class="num">5</span><span class="payout">7:5</span><span class="bet-info" id="place5Info"></span></button>
            <button type="button" class="number-btn" id="place6Btn" onclick="openBetModal('place6')"><span class="num">6</span><span class="payout">7:6</span><span class="bet-info" id="place6Info"></span></button>
            <button type="button" class="number-btn" id="place8Btn" onclick="openBetModal('place8')"><span class="num">8</span><span class="payout">7:6</span><span class="bet-info" id="place8Info"></span></button>
            <button type="button" class="number-btn" id="place9Btn" onclick="openBetModal('place9')"><span class="num">9</span><span class="payout">7:5</span><span class="bet-info" id="place9Info"></span></button>
            <button type="button" class="number-btn" id="place10Btn" onclick="openBetModal('place10')"><span class="num">10</span><span class="payout">9:5</span><span class="bet-info" id="place10Info"></span></button>
        </div>
    </div>

    <!-- Center Bets Submenu -->
    <div class="submenu" id="centerMenu">
        <div class="menu-header">
            <h2>Center Bets</h2>
            <button class="close-btn" onclick="closeCenterMenu()">Done</button>
        </div>
        <div class="center-grid">
            <button type="button" class="center-btn-tile" id="any7TileBtn" onclick="openBetModal('any7')"><span class="label">Any 7</span><span class="payout">4:1</span><span class="bet-info" id="any7Info"></span></button>
            <button type="button" class="center-btn-tile" id="anyCrapsTileBtn" onclick="openBetModal('anyCraps')"><span class="label">Any Craps</span><span class="payout">7:1</span><span class="bet-info" id="anyCrapsInfo"></span></button>
            <button type="button" class="center-btn-tile" id="fieldTileBtn" onclick="openBetModal('field')"><span class="label">Field</span><span class="payout">1:1 / 2:1</span><span class="bet-info" id="fieldInfo"></span></button>
            <button type="button" class="center-btn-tile" id="craps2TileBtn" onclick="openBetModal('craps2')"><span class="label">Craps 2</span><span class="payout">30:1</span><span class="bet-info" id="craps2Info"></span></button>
            <button type="button" class="center-btn-tile" id="craps3TileBtn" onclick="openBetModal('craps3')"><span class="label">Craps 3</span><span class="payout">15:1</span><span class="bet-info" id="craps3Info"></span></button>
            <button type="button" class="center-btn-tile" id="craps12TileBtn" onclick="openBetModal('craps12')"><span class="label">Craps 12</span><span class="payout">30:1</span><span class="bet-info" id="craps12Info"></span></button>
            <button type="button" class="center-btn-tile" id="yo11TileBtn" onclick="openBetModal('yo11')"><span class="label">Yo 11</span><span class="payout">15:1</span><span class="bet-info" id="yo11Info"></span></button>
            <button type="button" class="center-btn-tile" id="hard4TileBtn" onclick="openBetModal('hard4')"><span class="label">Hard 4</span><span class="payout">7:1</span><span class="bet-info" id="hard4Info"></span></button>
            <button type="button" class="center-btn-tile" id="hard6TileBtn" onclick="openBetModal('hard6')"><span class="label">Hard 6</span><span class="payout">9:1</span><span class="bet-info" id="hard6Info"></span></button>
            <button type="button" class="center-btn-tile" id="hard8TileBtn" onclick="openBetModal('hard8')"><span class="label">Hard 8</span><span class="payout">9:1</span><span class="bet-info" id="hard8Info"></span></button>
            <button type="button" class="center-btn-tile" id="hard10TileBtn" onclick="openBetModal('hard10')"><span class="label">Hard 10</span><span class="payout">7:1</span><span class="bet-info" id="hard10Info"></span></button>
        </div>
    </div>

    <!-- Bet Modal -->
    <div class="bet-modal" id="betModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="bet-modal-content">
            <h3 id="modalTitle">Bet</h3>
            <div class="current-bet-info" id="modalCurrentBet"></div>
            <label class="sr-only" for="betInput">Bet amount</label>
            <input type="number" id="betInput" placeholder="0" min="5" step="5" aria-describedby="modalCurrentBet">
            <div class="quick-amounts">
                <button class="quick-amt" onclick="setModalAmt(5)">$5</button>
                <button class="quick-amt" onclick="setModalAmt(25)">$25</button>
                <button class="quick-amt" onclick="setModalAmt(50)">$50</button>
                <button class="quick-amt" onclick="setModalAmt(100)">$100</button>
            </div>
            <div class="modal-actions" id="modalActions">
                <button class="modal-btn cancel" onclick="closeBetModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="confirmBet()">Place Bet</button>
            </div>
        </div>
    </div>

    <!-- Point Established Popup -->
    <div class="point-popup" id="pointPopup" role="dialog" aria-modal="true" aria-labelledby="popupHeading">
        <div class="point-popup-content">
            <h2 id="popupHeading">POINT ESTABLISHED</h2>
            <div class="point-number" id="popupPointNumber">6</div>
            <div class="point-text" id="popupText">Take odds on your Pass Line bet?</div>
            <div class="odds-buttons" id="popupOddsButtons">
                <button class="odds-btn" onclick="takeOddsFromPopup(1)">1x</button>
                <button class="odds-btn" onclick="takeOddsFromPopup(2)">2x</button>
                <button class="odds-btn" onclick="takeOddsFromPopup(3)">3x</button>
                <button class="odds-btn max-btn" onclick="takeOddsFromPopup('max')">Max Odds</button>
            </div>
            <button class="skip-btn" onclick="closePointPopup()">Skip</button>
            <div class="timer-bar" id="popupTimer"></div>
        </div>
    </div>

    <footer>
        <p>v3.1.0 &middot; Palmer Gill</p>
    </footer>

    <script>
        // ── Game State ──
        let balance = 1000;
        let point = null;
        let isComeOutRoll = true;
        let lastBets = null;
        let currentModalBet = null;
        let currentOddsTarget = null;
        let nextComeBetId = 1;
        let isRolling = false;
        let rollResultTimer = null;

        // Multiple Come/Don't Come bets: array of { id, point: null|number, amount: number, odds: number }
        let comeBets = [];
        let dontComeBets = [];

        // All bet types (no longer includes come/dontCome)
        let bets = {
            passLine: 0, dontPass: 0,
            any7: 0, anyCraps: 0, field: 0,
            craps2: 0, craps3: 0, craps12: 0, yo11: 0,
            hard4: 0, hard6: 0, hard8: 0, hard10: 0,
            place4: 0, place5: 0, place6: 0, place8: 0, place9: 0, place10: 0
        };

        // Odds bets for pass/don't pass only
        let oddsBets = { passLine: 0, dontPass: 0 };

        const oddsMultipliers = { 4: 3, 5: 4, 6: 5, 8: 5, 9: 4, 10: 3 };

        const betNames = {
            passLine: 'Pass Line', dontPass: "Don't Pass",
            any7: 'Any 7', anyCraps: 'Any Craps', field: 'Field',
            craps2: 'Craps 2', craps3: 'Craps 3', craps12: 'Craps 12', yo11: 'Yo 11',
            hard4: 'Hard 4', hard6: 'Hard 6', hard8: 'Hard 8', hard10: 'Hard 10',
            place4: 'Place 4', place5: 'Place 5', place6: 'Place 6',
            place8: 'Place 8', place9: 'Place 9', place10: 'Place 10'
        };

        const dicePatterns = {
            1: [[2,2]], 2: [[1,1],[3,3]], 3: [[1,1],[2,2],[3,3]],
            4: [[1,1],[1,3],[3,1],[3,3]], 5: [[1,1],[1,3],[2,2],[3,1],[3,3]],
            6: [[1,1],[1,3],[2,1],[2,3],[3,1],[3,3]]
        };

        // ── UI: Balance ──
        function updateBalance() {
            document.getElementById('balance').textContent = '$' + balance.toLocaleString();
        }

        function setStatus(message) {
            document.getElementById('gameStatus').textContent = message;
        }

        function showRollResultAnimation(amount) {
            const burst = document.getElementById('rollResultBurst');
            if (rollResultTimer) clearTimeout(rollResultTimer);

            burst.className = 'roll-result-burst';
            if (amount === 0) {
                burst.textContent = '';
                rollResultTimer = null;
                return;
            }

            burst.textContent = (amount > 0 ? '+$' : '-$') + Math.abs(amount).toLocaleString();
            burst.offsetHeight;
            burst.classList.add(amount > 0 ? 'win' : 'loss', 'active');

            rollResultTimer = setTimeout(() => {
                burst.classList.remove('active');
                rollResultTimer = null;
            }, 1200);
        }

        // ── UI: Dice ──
        function renderDie(dieId, value) {
            const die = document.getElementById(dieId);
            die.innerHTML = '';
            const pattern = dicePatterns[value];
            for (let row = 1; row <= 3; row++) {
                for (let col = 1; col <= 3; col++) {
                    const dot = document.createElement('div');
                    dot.className = 'die-dot';
                    if (!pattern.some(p => p[0] === row && p[1] === col)) dot.classList.add('hidden');
                    dot.style.gridRow = row;
                    dot.style.gridColumn = col;
                    die.appendChild(dot);
                }
            }
        }

        // ── Submenus ──
        function openPlaceMenu() { document.getElementById('placeMenu').classList.add('active'); }
        function closePlaceMenu() { document.getElementById('placeMenu').classList.remove('active'); }
        function openCenterMenu() { document.getElementById('centerMenu').classList.add('active'); }
        function closeCenterMenu() { document.getElementById('centerMenu').classList.remove('active'); }

        // ── Bet Modal ──
        function openBetModal(betType) {
            // Block come/don't come on come-out
            if ((betType === 'come' || betType === 'dontCome') && isComeOutRoll) return;
            if ((betType === 'passLine' || betType === 'dontPass') &&
                    bets[betType] > 0 && canManageOdds(betType)) {
                openOddsModal(betType);
                return;
            }

            currentModalBet = betType;
            currentOddsTarget = null;
            const isComeBet = (betType === 'come' || betType === 'dontCome');
            const name = isComeBet ? (betType === 'come' ? 'Come' : "Don't Come") : (betNames[betType] || betType);
            document.getElementById('modalTitle').textContent = name + ' Bet';
            const betInput = document.getElementById('betInput');
            betInput.value = '';
            betInput.min = getBetUnit(betType);
            betInput.step = getBetUnit(betType);

            // Show current bet info
            let info = '';
            if (isComeBet) {
                const arr = betType === 'come' ? comeBets : dontComeBets;
                if (arr.length > 0) {
                    info = arr.length + ' active ' + name + ' bet' + (arr.length > 1 ? 's' : '');
                }
            } else {
                const current = bets[betType] || 0;
                const oddsAmt = oddsBets[betType] || 0;
                if (current > 0) {
                    info = 'Current: $' + current;
                    if (oddsAmt > 0) info += ' + $' + oddsAmt + ' odds';
                }
            }
            const unit = getBetUnit(betType);
            if (unit > 5) {
                info = (info ? info + ' · ' : '') + 'Use $' + unit + ' increments';
            }
            document.getElementById('modalCurrentBet').textContent = info;

            // Show remove button if there's a current bet (not for come/dontCome - those are managed via strip)
            const actionsDiv = document.getElementById('modalActions');
            const current = isComeBet ? 0 : (bets[betType] || 0);
            const canRemove = current > 0 && canClearBet(betType);
            if (current > 0 && canRemove) {
                actionsDiv.className = 'modal-actions three-col';
                actionsDiv.innerHTML = '<button class="modal-btn cancel" onclick="closeBetModal()">Cancel</button>' +
                    '<button class="modal-btn remove" onclick="removeBetFromModal()">Remove</button>' +
                    '<button class="modal-btn confirm" onclick="confirmBet()">Add</button>';
            } else if (current > 0 && !canAddBet(betType)) {
                actionsDiv.className = 'modal-actions';
                actionsDiv.innerHTML = '<button class="modal-btn cancel" onclick="closeBetModal()">Done</button>';
            } else {
                actionsDiv.className = 'modal-actions';
                actionsDiv.innerHTML = '<button class="modal-btn cancel" onclick="closeBetModal()">Cancel</button>' +
                    '<button class="modal-btn confirm" onclick="confirmBet()">Place Bet</button>';
            }

            document.getElementById('betModal').classList.add('active');
            setTimeout(() => document.getElementById('betInput').focus(), 100);
        }

        function setModalAmt(amt) { document.getElementById('betInput').value = amt; }

        function closeBetModal() {
            document.getElementById('betModal').classList.remove('active');
            currentModalBet = null;
            currentOddsTarget = null;
        }

        function getBetUnit(betType) {
            if (betType === 'place6' || betType === 'place8') return 6;
            return 5;
        }

        function getBetValidationError(betType, amount) {
            const unit = getBetUnit(betType);
            if (!Number.isInteger(amount) || amount < unit) return 'Minimum bet is $' + unit;
            if (amount % unit !== 0) return 'Bet must be in $' + unit + ' increments';
            if (amount > balance) return 'Not enough balance';
            return '';
        }

        function confirmBet() {
            if (!currentModalBet) return;
            if (!canAddBet(currentModalBet)) {
                setStatus('Contract bets stay until resolved');
                return;
            }
            const amt = Number(document.getElementById('betInput').value);
            const validationError = getBetValidationError(currentModalBet, amt);
            if (validationError) {
                document.getElementById('modalCurrentBet').textContent = validationError;
                setStatus(validationError);
                return;
            }

            if (currentModalBet === 'come') {
                comeBets.push({ id: nextComeBetId++, point: null, amount: amt, odds: 0 });
            } else if (currentModalBet === 'dontCome') {
                dontComeBets.push({ id: nextComeBetId++, point: null, amount: amt, odds: 0 });
            } else {
                bets[currentModalBet] += amt;
            }
            balance -= amt;
            updateBalance();
            updateAllDisplays();
            closeBetModal();
        }

        function removeBetFromModal() {
            if (!currentModalBet) return;
            const bt = currentModalBet;
            if (!canClearBet(bt)) {
                setStatus('Contract bets stay until resolved');
                closeBetModal();
                return;
            }
            balance += bets[bt] + (oddsBets[bt] || 0);
            bets[bt] = 0;
            if (oddsBets[bt] !== undefined) oddsBets[bt] = 0;
            updateBalance();
            updateAllDisplays();
            closeBetModal();
        }

        // ── Odds ──
        function getOddsPayout(p, isPass) {
            if (isPass) {
                if (p === 4 || p === 10) return 2;
                if (p === 5 || p === 9) return 1.5;
                return 1.2; // 6 or 8
            } else {
                if (p === 4 || p === 10) return 0.5;
                if (p === 5 || p === 9) return 2/3;
                return 5/6;
            }
        }

        function addOddsToBet(bet, multiplier) {
            if (!bet || !bet.point || bet.amount === 0) return false;
            const maxAmt = bet.amount * oddsMultipliers[bet.point];
            const requestedAmt = multiplier === 'max' ? maxAmt : bet.amount * multiplier;
            const canAfford = Math.min(requestedAmt, maxAmt - bet.odds, balance);
            if (canAfford < 5) return false;
            bet.odds += canAfford;
            balance -= canAfford;
            return true;
        }

        function getOddsContext(betType, betId = null) {
            if (betType === 'passLine' || betType === 'dontPass') {
                if (!point || bets[betType] <= 0) return null;
                return {
                    betType: betType,
                    betId: null,
                    point: point,
                    amount: bets[betType],
                    odds: oddsBets[betType],
                    label: betNames[betType]
                };
            }

            const arr = betType === 'dontCome' ? dontComeBets : comeBets;
            const bet = arr.find(b => b.id === betId);
            if (!bet || !bet.point || bet.amount <= 0) return null;
            return {
                betType: betType,
                betId: betId,
                point: bet.point,
                amount: bet.amount,
                odds: bet.odds,
                label: (betType === 'dontCome' ? 'DC ' : 'Come ') + bet.point
            };
        }

        function setOddsAmount(betType, betId, amount) {
            if (betType === 'passLine' || betType === 'dontPass') {
                oddsBets[betType] = amount;
                return true;
            }
            const arr = betType === 'dontCome' ? dontComeBets : comeBets;
            const bet = arr.find(b => b.id === betId);
            if (!bet) return false;
            bet.odds = amount;
            return true;
        }

        function canManageOdds(betType, betId = null) {
            return getOddsContext(betType, betId) !== null;
        }

        function getMaxOddsAmount(context) {
            return context.amount * oddsMultipliers[context.point];
        }

        function openOddsModal(betType, betId = null) {
            const context = getOddsContext(betType, betId);
            if (!context) {
                setStatus('Odds are available after a point is set');
                return;
            }

            currentModalBet = null;
            currentOddsTarget = { betType: betType, betId: betId };
            const maxOdds = getMaxOddsAmount(context);
            const remaining = Math.max(0, maxOdds - context.odds);
            const betInput = document.getElementById('betInput');
            betInput.value = '';
            betInput.min = 5;
            betInput.step = 5;
            betInput.placeholder = context.odds > 0 ? String(context.odds) : '0';

            document.getElementById('modalTitle').textContent = context.label + ' Odds';
            document.getElementById('modalCurrentBet').textContent =
                'Bet $' + context.amount + ' on ' + context.point +
                ' · Odds $' + context.odds + ' / $' + maxOdds +
                (remaining > 0 ? ' · Can add $' + remaining : ' · Max odds');

            const actionsDiv = document.getElementById('modalActions');
            if (context.odds > 0) {
                actionsDiv.className = 'modal-actions three-col';
                actionsDiv.innerHTML = '<button class="modal-btn cancel" onclick="closeBetModal()">Cancel</button>' +
                    '<button class="modal-btn remove" onclick="removeOddsFromModal()">Remove Odds</button>' +
                    '<button class="modal-btn confirm" onclick="addOddsFromModal()">Add Odds</button>';
            } else {
                actionsDiv.className = 'modal-actions';
                actionsDiv.innerHTML = '<button class="modal-btn cancel" onclick="closeBetModal()">Cancel</button>' +
                    '<button class="modal-btn confirm" onclick="addOddsFromModal()">Add Odds</button>';
            }

            document.getElementById('betModal').classList.add('active');
            setTimeout(() => document.getElementById('betInput').focus(), 100);
        }

        function addOddsFromModal() {
            if (!currentOddsTarget) return;
            const context = getOddsContext(currentOddsTarget.betType, currentOddsTarget.betId);
            if (!context) {
                closeBetModal();
                return;
            }

            const amount = Number(document.getElementById('betInput').value);
            if (!Number.isInteger(amount) || amount < 5) {
                document.getElementById('modalCurrentBet').textContent = 'Enter at least $5 in odds';
                setStatus('Enter at least $5 in odds');
                return;
            }

            const maxOdds = getMaxOddsAmount(context);
            const remaining = maxOdds - context.odds;
            if (remaining < 5) {
                document.getElementById('modalCurrentBet').textContent = 'Odds are already maxed';
                setStatus('Odds are already maxed');
                return;
            }
            if (balance < 5) {
                document.getElementById('modalCurrentBet').textContent = 'Not enough balance';
                setStatus('Not enough balance');
                return;
            }

            const added = Math.min(amount, remaining, balance);
            setOddsAmount(context.betType, context.betId, context.odds + added);
            balance -= added;
            updateBalance();
            updateAllDisplays();
            setStatus('Added $' + added + ' odds to ' + context.label);
            closeBetModal();
        }

        function removeOddsFromModal() {
            if (!currentOddsTarget) return;
            const context = getOddsContext(currentOddsTarget.betType, currentOddsTarget.betId);
            if (!context || context.odds <= 0) {
                setStatus('No odds to remove');
                closeBetModal();
                return;
            }

            const rawAmount = document.getElementById('betInput').value;
            const amount = rawAmount === '' ? context.odds : Number(rawAmount);
            if (!Number.isInteger(amount) || amount <= 0) {
                document.getElementById('modalCurrentBet').textContent = 'Enter an odds amount to remove';
                setStatus('Enter an odds amount to remove');
                return;
            }

            const removed = Math.min(amount, context.odds);
            setOddsAmount(context.betType, context.betId, context.odds - removed);
            balance += removed;
            updateBalance();
            updateAllDisplays();
            setStatus('Removed $' + removed + ' odds from ' + context.label);
            closeBetModal();
        }

        function takeMaxOdds(bt) {
            let pt;
            if (bt === 'passLine' || bt === 'dontPass') { pt = point; }
            if (!pt || bets[bt] === 0) return;
            const lineBet = { point: pt, amount: bets[bt], odds: oddsBets[bt] };
            if (addOddsToBet(lineBet, 'max')) {
                oddsBets[bt] = lineBet.odds;
                updateBalance();
                updateAllDisplays();
            }
        }

        function takeMaxOddsComeBet(index, isDontCome) {
            const arr = isDontCome ? dontComeBets : comeBets;
            if (index < 0 || index >= arr.length) return;
            const bet = arr[index];
            if (addOddsToBet(bet, 'max')) {
                updateBalance();
                updateAllDisplays();
            }
        }

        function takeMaxOddsAll() {
            ['passLine', 'dontPass'].forEach(bt => takeMaxOdds(bt));
            comeBets.forEach((bet, i) => { if (bet.point) takeMaxOddsComeBet(i, false); });
            dontComeBets.forEach((bet, i) => { if (bet.point) takeMaxOddsComeBet(i, true); });
        }

        // ── Clear Bets ──
        function canClearBet(bt) {
            return !(bt === 'passLine' && !isComeOutRoll && bets.passLine > 0);
        }

        function canAddBet(bt) {
            return canClearBet(bt);
        }

        function canClearComeBet(index, isDontCome) {
            const arr = isDontCome ? dontComeBets : comeBets;
            if (index < 0 || index >= arr.length) return false;
            const bet = arr[index];
            return isDontCome || !bet.point;
        }

        function hasLockedContractBets() {
            return (!isComeOutRoll && bets.passLine > 0) || comeBets.some(bet => bet.point);
        }

        function clearBet(bt) {
            if (!canClearBet(bt)) {
                setStatus('Contract bets stay until resolved');
                return;
            }
            balance += bets[bt] + (oddsBets[bt] || 0);
            bets[bt] = 0;
            if (oddsBets[bt] !== undefined) oddsBets[bt] = 0;
            updateBalance();
            updateAllDisplays();
        }

        function clearComeBet(index, isDontCome) {
            const arr = isDontCome ? dontComeBets : comeBets;
            if (index < 0 || index >= arr.length) return;
            if (!canClearComeBet(index, isDontCome)) {
                setStatus('Contract bets stay until resolved');
                return;
            }
            const bet = arr[index];
            balance += bet.amount + bet.odds;
            arr.splice(index, 1);
            updateBalance();
            updateAllDisplays();
        }

        function clearAllBets() {
            Object.keys(bets).forEach(bt => {
                if (canClearBet(bt)) {
                    balance += bets[bt] + (oddsBets[bt] || 0);
                    bets[bt] = 0;
                    if (oddsBets[bt] !== undefined) oddsBets[bt] = 0;
                }
            });
            const lockedComeBets = [];
            comeBets.forEach(b => {
                if (b.point) lockedComeBets.push(b);
                else balance += b.amount + b.odds;
            });
            dontComeBets.forEach(b => { balance += b.amount + b.odds; });
            comeBets = lockedComeBets;
            dontComeBets = [];
            updateBalance();
            updateAllDisplays();
        }

        function repeatLastBets() {
            if (!lastBets) return;
            if (hasLockedContractBets()) {
                setStatus('Repeat is available after contract bets resolve');
                return;
            }
            clearAllBets();
            Object.keys(lastBets.bets).forEach(bt => {
                const amt = lastBets.bets[bt];
                if (amt > 0 && amt <= balance) {
                    bets[bt] = amt;
                    balance -= amt;
                }
            });
            // Repeat come/don't come bets if not come-out
            if (!isComeOutRoll && lastBets.comeBets) {
                lastBets.comeBets.forEach(b => {
                    if (b.amount <= balance) {
                        comeBets.push({ id: nextComeBetId++, point: null, amount: b.amount, odds: 0 });
                        balance -= b.amount;
                    }
                });
            }
            if (!isComeOutRoll && lastBets.dontComeBets) {
                lastBets.dontComeBets.forEach(b => {
                    if (b.amount <= balance) {
                        dontComeBets.push({ id: nextComeBetId++, point: null, amount: b.amount, odds: 0 });
                        balance -= b.amount;
                    }
                });
            }
            updateBalance();
            updateAllDisplays();
        }

        // ── Display Updates ──
        function updateAllDisplays() {
            // Main bet buttons
            updateMainBetBtn('passLine', 'passLineBtn', 'passLineInfo', 'passLineOddsChip');
            updateMainBetBtn('dontPass', 'dontPassBtn', 'dontPassInfo', 'dontPassOddsChip');

            // Come/Don't Come enabled state
            const comeBtn = document.getElementById('comeBtn');

                dcBtn.disabled = true;

                if (totalOdds > 0) {

                    comeOddsChip.classList.add('visible');
                } else {
                    comeOddsChip.classList.remove('visible');
                }
            } else {
                comeInfoEl.textContent = 'Tap to bet';
                comeOddsChip.classList.remove('visible');
            }

            // Don't Come bet button display
            const dcInfoEl = document.getElementById('dontComeInfo');
            const dcOddsChip = document.getElementById('dontComeOddsChip');
            if (dontComeBets.length > 0) {
                const totalAmt = dontComeBets.reduce((s, b) => s + b.amount, 0);
                const totalOdds = dontComeBets.reduce((s, b) => s + b.odds, 0);
                const pts = dontComeBets.filter(b => b.point).map(b => b.point);
                let text = '$' + totalAmt;
                if (pts.length > 0) text += ' \u2022 ' + pts.join(',');
                const waiting = dontComeBets.filter(b => !b.point).length;
                if (waiting > 0) text += ' \u2022 ' + waiting + ' new';
                dcInfoEl.textContent = text;
                if (totalOdds > 0) {
                    dcOddsChip.textContent = '+$' + totalOdds + ' odds';
                    dcOddsChip.classList.add('visible');
                } else {
                    dcOddsChip.classList.remove('visible');
                }
            } else {
                dcInfoEl.textContent = 'Tap to bet';
                dcOddsChip.classList.remove('visible');
            }

            // Place bet buttons
            ['place4','place5','place6','place8','place9','place10'].forEach(bt => {
                const btn = document.getElementById(bt + 'Btn');
                const info = document.getElementById(bt + 'Info');
                if (bets[bt] > 0) {
                    btn.classList.add('has-bet');
                    info.textContent = '$' + bets[bt];
                } else {
                    btn.classList.remove('has-bet');
                    info.textContent = '';
                }
            });

            // Place info summary
            const placeBetList = ['place4','place5','place6','place8','place9','place10'];
            const activePlaces = placeBetList.filter(b => bets[b] > 0);
            const placeTotal = placeBetList.reduce((s, b) => s + bets[b], 0);
            document.getElementById('placeInfo').textContent = activePlaces.length > 0
                ? activePlaces.length + ' numbers \u2022 $' + placeTotal
                : '4, 5, 6, 8, 9, 10';

            // Center bet tiles
            ['any7','anyCraps','field','craps2','craps3','craps12','yo11','hard4','hard6','hard8','hard10'].forEach(bt => {
                const tile = document.getElementById(bt + 'TileBtn');
                const info = document.getElementById(bt + 'Info');
                if (tile) {
                    if (bets[bt] > 0) {
                        tile.classList.add('has-bet');
                        if (info) info.textContent = '$' + bets[bt];
                    } else {
                        tile.classList.remove('has-bet');
                        if (info) info.textContent = '';
                    }
                }
            });

            // Center info summary
            const centerBets = ['any7','anyCraps','field','craps2','craps3','craps12','yo11','hard4','hard6','hard8','hard10'];
            const activeCenters = centerBets.filter(b => bets[b] > 0);
            const centerTotal = centerBets.reduce((s, b) => s + bets[b], 0);
            document.getElementById('centerInfo').textContent = activeCenters.length > 0
                ? activeCenters.length + ' bets \u2022 $' + centerTotal
                : 'Props & Hardways';

            // Active bets strip
            updateActiveBetsStrip();

            // Max odds button
            updateMaxOddsButton();

        }

        function updateMainBetBtn(bt, btnId, infoId, oddsChipId) {
            const info = document.getElementById(infoId);
            const chip = document.getElementById(oddsChipId);
            if (bets[bt] > 0) {
                info.textContent = '$' + bets[bt];
            } else {
                info.textContent = 'Tap to bet';
            }
            if (chip) {
                if (oddsBets[bt] > 0) {
                    chip.textContent = '+$' + oddsBets[bt] + ' odds';
                    chip.classList.add('visible');
                } else {
                    chip.classList.remove('visible');
                }
            }
        }

        function updateActiveBetsStrip() {
            const strip = document.getElementById('activeBetsStrip');
            strip.innerHTML = '';
            const allBetKeys = Object.keys(bets);
            allBetKeys.forEach(bt => {
                if (bets[bt] > 0) {
                    const chip = document.createElement('div');
                    chip.className = 'bet-chip';
                    let text = betNames[bt] + ': $' + bets[bt];
                    if (oddsBets[bt] > 0) text += ' +$' + oddsBets[bt];
                    chip.append(document.createTextNode(text + ' '));
                    if (canManageOdds(bt)) {
                        const oddsButton = document.createElement('button');
                        oddsButton.type = 'button';
                        oddsButton.className = 'chip-odds';
                        oddsButton.textContent = 'Odds';
                        oddsButton.setAttribute('aria-label', 'Manage odds for ' + betNames[bt]);
                        oddsButton.onclick = () => openOddsModal(bt);
                        chip.appendChild(oddsButton);
                    }
                    const clearButton = document.createElement('button');
                    clearButton.type = 'button';
                    clearButton.className = 'chip-x';
                    clearButton.textContent = '\u2715';
                    clearButton.setAttribute('aria-label', 'Clear ' + betNames[bt]);
                    clearButton.disabled = !canClearBet(bt);
                    clearButton.onclick = () => clearBet(bt);

            });
            // Come bets
            comeBets.forEach((bet, i) => {
                const chip = document.createElement('div');
