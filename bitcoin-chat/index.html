<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Chat</title>
    <link rel="stylesheet" href="/shared/site-nav.css?v=4">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="chat-panel" aria-label="Bitcoin chat">
            <header class="topbar">
                <a href="/" class="back-link" aria-label="Back to projects">&larr;</a>
                <div class="title-group">
                    <h1>Bitcoin Chat</h1>
                    <p id="nodeStatus"><span class="status-dot" aria-hidden="true"></span>Checking node...</p>
                </div>
                <div class="node-pills" aria-label="Node summary">
                    <div class="node-pill" id="heightPill">Height --</div>
                    <div class="node-pill" id="syncPill">Sync --</div>
                    <div class="node-pill" id="chainPill">Chain --</div>
                </div>
            </header>

            <div class="chat-layout">
                <div id="messages" class="messages" aria-live="polite"></div>
            </div>

            <form id="chatForm" class="composer">
                <label class="sr-only" for="messageInput">Ask about Bitcoin blockchain data</label>
                <textarea id="messageInput" rows="1" placeholder="Ask Bitcoin..." maxlength="1000" required></textarea>
                <button type="submit" aria-label="Send message">
                    <span>Send</span>
                </button>
            </form>
        </section>
    </main>
    <script src="/shared/site-nav.js?v=4"></script>
    <script src="app.js"></script>
</body>
</html>
