[build]
builder = "nixpacks"

[deploy]
startCommand = "bash start-railway.sh"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

[environments]
[environments.production]
[environments.production.deploy]
startCommand = "bash start-railway.sh"
healthcheckPath = "/health"
healthcheckTimeout = 30
